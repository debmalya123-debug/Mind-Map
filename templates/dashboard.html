<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMap.AI | Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <div class="ambient-bg"></div>

    <header class="dash-header">
        <a href="/" class="logo">MindMap<span>.AI</span></a>
        <div class="user-actions">
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </header>

    <main class="dash-main">
        <div class="library-header">
            <h1 class="section-title">Your Mindmaps</h1>
        </div>
        
        <div class="grid" id="mindmap-grid">
            <!-- Create New Card -->
            <div class="card create-card" onclick="openCreateModal()">
                <div class="create-icon">+</div>
                <div style="font-weight: 500;">Create new mindmap</div>
            </div>
            
            <!-- Existing maps will be injected here via JS -->
        </div>
    </main>

    <!-- Create Modal -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeCreateModal()">×</button>
            <h2>New Mindmap</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.5rem;">Paste your syllabus or study material below. AI will extract and structure it automatically.</p>
            
            <textarea id="syllabus-input" rows="8" placeholder="Enter text here..."></textarea>
            
            <button id="generate-btn" class="btn-primary" onclick="generateMap()">Generate Map</button>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal-overlay" id="rename-modal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeRenameModal()">×</button>
            <h2>Rename Mindmap</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.5rem;">Enter a new title for this mindmap.</p>
            
            <input type="text" id="rename-input" placeholder="Enter new title..." onkeydown="if(event.key === 'Enter') submitRename()">
            
            <button id="rename-btn" class="btn-primary" onclick="submitRename()">Rename</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadMaps);

        async function loadMaps() {
            const grid = document.getElementById('mindmap-grid');
            
            // Keep the create card
            const createCard = grid.firstElementChild;
            grid.innerHTML = '';
            grid.appendChild(createCard);

            try {
                const res = await fetch('/api/get_mindmaps');
                if(!res.ok) {
                    if(res.status === 401) window.location.href = '/';
                    return;
                }
                const maps = await res.json();
                
                maps.forEach((m, index) => {
                    const card = document.createElement('a');
                    card.href = `/app/${m.id}`;
                    card.className = 'card';
                    card.style.animationDelay = `${0.05 * index}s`;
                    
                    const dateObj = new Date(m.created_at);
                    const dateStr = dateObj.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
                    
                    card.innerHTML = `
                        <div class="card-menu" onclick="event.preventDefault(); event.stopPropagation(); toggleMenu(this)">
                            <button class="card-menu-btn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                            </button>
                            <div class="card-menu-dropdown">
                                <button class="menu-item rename" onclick="renameMindmap('${m.id}', this, event)">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
                                    Rename
                                </button>
                                <button class="menu-item delete" onclick="deleteMindmap('${m.id}', event)">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                    Delete
                                </button>
                            </div>
                        </div>
                        <div class="card-content">
                            <div class="card-title">${m.title}</div>
                            <div class="card-meta">
                                <span>${dateStr}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch(e) {
                console.error("Error loading maps", e);
            }
        }

        // Handle clicking outside to close menus
        document.addEventListener('click', function(e) {
            if(!e.target.closest('.card-menu')) {
                document.querySelectorAll('.card-menu-dropdown').forEach(d => d.classList.remove('active'));
            }
        });

        function toggleMenu(menuContainer) {
            // Close others
            document.querySelectorAll('.card-menu-dropdown').forEach(d => {
                if(d !== menuContainer.querySelector('.card-menu-dropdown')) {
                    d.classList.remove('active');
                }
            });
            const dropdown = menuContainer.querySelector('.card-menu-dropdown');
            dropdown.classList.toggle('active');
        }

        async function deleteMindmap(id, event) {
            event.preventDefault();
            event.stopPropagation();
            
            if(!confirm("Are you sure you want to delete this mindmap? This cannot be undone.")) return;
            
            try {
                const res = await fetch(`/api/delete_mindmap/${id}`, { method: 'DELETE' });
                if(!res.ok) throw new Error("Failed to delete");
                loadMaps(); // Reload the grid
            } catch(e) {
                alert("Error deleting mindmap: " + e.message);
            }
        }

        let currentRenameId = null;
        let currentRenameTitle = "";

        function renameMindmap(id, btn, event) {
            event.preventDefault();
            event.stopPropagation();
            
            // Close dropdown menu
            document.querySelectorAll('.card-menu-dropdown').forEach(d => d.classList.remove('active'));

            const card = btn.closest('.card');
            const titleEl = card.querySelector('.card-title');
            const currentTitle = titleEl.textContent.trim();
            
            openRenameModal(id, currentTitle);
        }

        function openRenameModal(id, title) {
            currentRenameId = id;
            currentRenameTitle = title;
            document.getElementById('rename-input').value = title;
            document.getElementById('rename-modal').classList.add('active');
            
            // Focus input field after overlay transition
            setTimeout(() => {
                document.getElementById('rename-input').focus();
            }, 100);
        }

        function closeRenameModal() {
            document.getElementById('rename-modal').classList.remove('active');
            currentRenameId = null;
            currentRenameTitle = "";
        }

        async function submitRename() {
            if (!currentRenameId) return;
            const newTitle = document.getElementById('rename-input').value.trim();
            if (!newTitle) {
                alert("Title cannot be empty.");
                return;
            }
            if (newTitle === currentRenameTitle) {
                closeRenameModal();
                return;
            }

            const btn = document.getElementById('rename-btn');
            btn.disabled = true;
            btn.textContent = "Renaming...";

            try {
                const res = await fetch(`/api/rename_mindmap/${currentRenameId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: newTitle })
                });
                if(!res.ok) throw new Error("Failed to rename");
                closeRenameModal();
                loadMaps(); // Reload the grid
            } catch(e) {
                alert("Error renaming mindmap: " + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "Rename";
            }
        }

        async function generateMap() {
            const text = document.getElementById('syllabus-input').value.trim();
            if(!text) return alert("Please enter syllabus text.");

            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.innerHTML = `<div class="loading-state"><div class="spinner"></div> Synthesizing...</div>`;

            try {
                // 1. Generate Tree
                const r = await fetch('/generate_mindmap', {
                    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({syllabus:text})
                });
                if(!r.ok) throw new Error("API Error generating mindmap");
                const d = await r.json();

                // 2. Save to DB
                const saveRes = await fetch('/api/save_mindmap', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        title: d.title || "Mindmap " + new Date().toLocaleDateString(),
                        nodes: d.nodes
                    })
                });
                
                if(!saveRes.ok) throw new Error("Error saving mindmap");
                
                const saveData = await saveRes.json();
                
                // 3. Redirect to Viewer
                window.location.href = `/app/${saveData.mindmap_id}`;

            } catch(e) {
                console.error(e);
                alert("Error: " + e.message);
                btn.disabled = false;
                btn.innerHTML = `Generate Map`;
            }
        }

        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            window.location.href = '/';
        }

        function openCreateModal() {
            document.getElementById('create-modal').classList.add('active');
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.remove('active');
        }
    </script>
</body>
</html>
