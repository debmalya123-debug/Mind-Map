<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ mindmap_title }} — MindMap.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=12">
</head>
<body>
    <script>
        window.INITIAL_MINDMAP_ID = "{{ mindmap_id }}";
        window.MINDMAP_TITLE = "{{ mindmap_title }}";
    </script>

    <div class="app-container">
        <!-- Top Nav -->
        <header class="app-header">
            <a href="/dashboard" class="btn-back" title="Back to Dashboard">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
            </a>
            <div class="header-center">
                <h1 class="map-title">{{ mindmap_title }}</h1>
                <span class="map-subtitle">MindMap.AI</span>
            </div>
            <div style="width: 48px;"></div>
        </header>

        <!-- Main Workspace -->
        <div class="workspace">
            <main class="canvas-area">
                <div id="viz-container"></div>
                
                <!-- Floating Controls Pill -->
                <div class="controls-pill">
                    <button id="expand-all" class="ctrl-btn" title="Expand All">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/></svg>
                    </button>
                    <button id="collapse-all" class="ctrl-btn" title="Collapse All">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14h6v6"/><path d="M20 10h-6V4"/><path d="m14 10 7-7"/><path d="M3 21l7-7"/></svg>
                    </button>
                    <div class="pill-divider"></div>
                    <button id="zoom-in" class="ctrl-btn" title="Zoom In">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M11 8v6"/><path d="M8 11h6"/></svg>
                    </button>
                    <button id="fit" class="ctrl-btn" title="Fit to View">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3z"/><path d="M14 3h7v7h-7z"/><path d="M3 14h7v7H3z"/><path d="M14 14h7v7h-7z"/></svg>
                    </button>
                    <button id="zoom-out" class="ctrl-btn" title="Zoom Out">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M8 11h6"/></svg>
                    </button>
                </div>

                <!-- Loading Overlay -->
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Loading Mindmap...</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Notes Card Overlay -->
    <div id="notes-card" class="notes-card hidden-card">
        <div class="notes-card-header">
            <div class="notes-card-info">
                <span id="node-type" class="node-badge">topic</span>
                <h2 id="node-label">Select a Node</h2>
            </div>
            <button id="close-notes-btn" class="card-close-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>
        <div class="notes-card-actions">
            <button id="generate-note-btn" class="generate-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                Generate Study Notes
            </button>
        </div>
        <div id="note-content" class="notes-card-content">
            <div class="notes-empty">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                <p>Click <strong>"Generate"</strong> to create<br>detailed study notes for this topic.</p>
            </div>
        </div>
    </div>

    <!-- Floating AI Chat Widget -->
    <div id="ai-chat-widget" class="chat-widget">
        <button id="chat-toggle" class="chat-fab" title="Ask AI">
            <svg class="chat-icon-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
            <svg class="chat-icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>

        <div id="chat-panel" class="chat-panel hidden-chat">
            <div class="chat-header">
                <div class="chat-header-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    <span>Ask AI</span>
                </div>
                <div id="chat-node-indicator" class="chat-node-indicator">
                    <span class="indicator-dot"></span>
                    <span id="chat-node-name">Click a node to start</span>
                </div>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="chat-welcome">
                    <p>👋 Click on any node in the mindmap, then ask me anything about it. Your chat history is saved per node.</p>
                </div>
            </div>
            <div class="chat-input-area">
                <input id="query-input" class="chat-input" placeholder="Ask about the selected topic..." disabled>
                <button id="query-btn" class="chat-send" disabled title="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4z"/><path d="m22 2-10 10"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden compat elements -->
    <div id="note-controls" class="hidden"></div>
    <div id="query-res" class="hidden"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v=12"></script>
</body>
</html>
